networks:
  signal-net:
    driver: bridge

volumes:
  redis-data:

services:
  server:
    build:
      context: ..
      args:
        GO_VERSION: "1.23"
    image: lessup/signaling:dev
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${SIGNAL_PORT:-8080}:8080"
    depends_on:
      redis:
        condition: service_healthy
      coturn:
        condition: service_started
    healthcheck:
      test: ["CMD", "/app/signal-server", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
    networks:
      - signal-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    networks:
      - signal-net

  coturn:
    image: instrumentisto/coturn:4.6
    restart: unless-stopped
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49152-49200:49152-49200/udp"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    networks:
      - signal-net
